<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
    <marker id="arrow-disk" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#616161"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="550" y="32" text-anchor="middle" font-size="22" font-weight="600" fill="#1a1a1a">
    kafko — in-process pipeline of producers and consumers
  </text>
  <text x="550" y="54" text-anchor="middle" font-size="13" fill="#666">
    Any consumer can also be a producer — chain stages together to build streaming pipelines without leaving the process
  </text>

  <!-- Process boundary -->
  <rect x="30" y="78" width="1040" height="660" rx="10"
        fill="#ffffff" stroke="#888" stroke-width="2" stroke-dasharray="8,5"/>
  <text x="50" y="103" font-size="13" font-style="italic" fill="#555">
    Your Rust process — single binary, one tokio runtime, no broker daemon, no network hop
  </text>

  <!-- Section header for pipeline -->
  <text x="550" y="138" text-anchor="middle" font-size="13" font-weight="600" fill="#333">
    Pipeline: Producer → Topic → Consumer+Producer → Topic → Consumer+Producer → Topic → Consumer
  </text>

  <!-- ============ STAGE 1: Producer (ingest) ============ -->
  <rect x="55" y="170" width="110" height="100" rx="8"
        fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="110" y="195" text-anchor="middle" font-size="11" font-weight="700" fill="#1b5e20">
    PRODUCER
  </text>
  <text x="110" y="215" text-anchor="middle" font-size="12" font-weight="600" fill="#2e7d32">
    ingest
  </text>
  <text x="110" y="234" text-anchor="middle" font-size="9" fill="#558b2f">
    reads from
  </text>
  <text x="110" y="246" text-anchor="middle" font-size="9" fill="#558b2f">
    HTTP / kafka /
  </text>
  <text x="110" y="258" text-anchor="middle" font-size="9" fill="#558b2f">
    file tailer
  </text>

  <!-- Arrow 1 -->
  <path d="M 168 220 L 195 220" stroke="#444" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="181" y="212" text-anchor="middle" font-size="9" font-family="monospace" fill="#555">.send()</text>

  <!-- ============ TOPIC: raw_events ============ -->
  <rect x="198" y="170" width="115" height="100" rx="8"
        fill="#fff3e0" stroke="#ef6c00" stroke-width="2"/>
  <text x="255" y="193" text-anchor="middle" font-size="10" font-weight="700" fill="#e65100">
    TOPIC
  </text>
  <text x="255" y="210" text-anchor="middle" font-size="12" font-weight="600" fill="#bf360c">
    raw_events
  </text>
  <g transform="translate(206, 222)">
    <rect x="0"  y="0" width="18" height="18" fill="#ffe0b2" stroke="#fb8c00"/>
    <rect x="18" y="0" width="18" height="18" fill="#ffe0b2" stroke="#fb8c00"/>
    <rect x="36" y="0" width="18" height="18" fill="#ffe0b2" stroke="#fb8c00"/>
    <rect x="54" y="0" width="18" height="18" fill="#ffe0b2" stroke="#fb8c00"/>
    <rect x="72" y="0" width="18" height="18" fill="#ffe0b2" stroke="#fb8c00"/>
    <rect x="90" y="0" width="18" height="18" fill="#ffe0b2" stroke="#fb8c00"/>
    <text x="9"   y="13" text-anchor="middle" font-size="9" fill="#bf360c">0</text>
    <text x="27"  y="13" text-anchor="middle" font-size="9" fill="#bf360c">1</text>
    <text x="45"  y="13" text-anchor="middle" font-size="9" fill="#bf360c">2</text>
    <text x="63"  y="13" text-anchor="middle" font-size="9" fill="#bf360c">3</text>
    <text x="81"  y="13" text-anchor="middle" font-size="9" fill="#bf360c">4</text>
    <text x="99"  y="13" text-anchor="middle" font-size="9" fill="#bf360c">5</text>
  </g>
  <text x="255" y="258" text-anchor="middle" font-size="8" font-style="italic" fill="#8d6e63">
    6 partitions · key-routed
  </text>

  <!-- Arrow 2 -->
  <path d="M 316 220 L 343 220" stroke="#444" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="329" y="212" text-anchor="middle" font-size="9" font-family="monospace" fill="#555">.next()</text>

  <!-- ============ STAGE 2: Consumer + Producer (enricher) ============ -->
  <g>
    <!-- Left half: consumer side -->
    <rect x="346" y="170" width="60" height="100" rx="8 0 0 8"
          fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
    <!-- Right half: producer side -->
    <rect x="406" y="170" width="60" height="100" rx="0 8 8 0"
          fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
    <!-- Mask the inner border so it looks like one box -->
    <line x1="406" y1="172" x2="406" y2="268" stroke="#999" stroke-width="1" stroke-dasharray="2,2"/>

    <text x="406" y="190" text-anchor="middle" font-size="10" font-weight="700" fill="#3a1855">
      CONS + PROD
    </text>
    <text x="406" y="208" text-anchor="middle" font-size="12" font-weight="600" fill="#4a148c">
      enricher
    </text>
    <text x="376" y="227" text-anchor="middle" font-size="8" font-weight="600" fill="#6a1b9a">read</text>
    <text x="436" y="227" text-anchor="middle" font-size="8" font-weight="600" fill="#2e7d32">write</text>
    <text x="406" y="244" text-anchor="middle" font-size="9" fill="#444">
      transform &amp;
    </text>
    <text x="406" y="256" text-anchor="middle" font-size="9" fill="#444">
      add metadata
    </text>
  </g>

  <!-- Arrow 3 -->
  <path d="M 470 220 L 497 220" stroke="#444" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="483" y="212" text-anchor="middle" font-size="9" font-family="monospace" fill="#555">.send()</text>

  <!-- ============ TOPIC: enriched ============ -->
  <rect x="500" y="170" width="115" height="100" rx="8"
        fill="#fff3e0" stroke="#ef6c00" stroke-width="2"/>
  <text x="557" y="193" text-anchor="middle" font-size="10" font-weight="700" fill="#e65100">
    TOPIC
  </text>
  <text x="557" y="210" text-anchor="middle" font-size="12" font-weight="600" fill="#bf360c">
    enriched
  </text>
  <g transform="translate(508, 222)">
    <rect x="0"  y="0" width="18" height="18" fill="#ffe0b2" stroke="#fb8c00"/>
    <rect x="18" y="0" width="18" height="18" fill="#ffe0b2" stroke="#fb8c00"/>
    <rect x="36" y="0" width="18" height="18" fill="#ffe0b2" stroke="#fb8c00"/>
    <rect x="54" y="0" width="18" height="18" fill="#ffe0b2" stroke="#fb8c00"/>
    <rect x="72" y="0" width="18" height="18" fill="#ffe0b2" stroke="#fb8c00"/>
    <rect x="90" y="0" width="18" height="18" fill="#ffe0b2" stroke="#fb8c00"/>
    <text x="9"  y="13" text-anchor="middle" font-size="9" fill="#bf360c">0</text>
    <text x="27" y="13" text-anchor="middle" font-size="9" fill="#bf360c">1</text>
    <text x="45" y="13" text-anchor="middle" font-size="9" fill="#bf360c">2</text>
    <text x="63" y="13" text-anchor="middle" font-size="9" fill="#bf360c">3</text>
    <text x="81" y="13" text-anchor="middle" font-size="9" fill="#bf360c">4</text>
    <text x="99" y="13" text-anchor="middle" font-size="9" fill="#bf360c">5</text>
  </g>
  <text x="557" y="258" text-anchor="middle" font-size="8" font-style="italic" fill="#8d6e63">
    6 partitions · key-routed
  </text>

  <!-- Arrow 4 -->
  <path d="M 618 220 L 645 220" stroke="#444" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="631" y="212" text-anchor="middle" font-size="9" font-family="monospace" fill="#555">.next()</text>

  <!-- ============ STAGE 3: Consumer + Producer (filter/alerter) ============ -->
  <g>
    <rect x="648" y="170" width="60" height="100" rx="8 0 0 8"
          fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
    <rect x="708" y="170" width="60" height="100" rx="0 8 8 0"
          fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
    <line x1="708" y1="172" x2="708" y2="268" stroke="#999" stroke-width="1" stroke-dasharray="2,2"/>

    <text x="708" y="190" text-anchor="middle" font-size="10" font-weight="700" fill="#3a1855">
      CONS + PROD
    </text>
    <text x="708" y="208" text-anchor="middle" font-size="12" font-weight="600" fill="#4a148c">
      filter
    </text>
    <text x="678" y="227" text-anchor="middle" font-size="8" font-weight="600" fill="#6a1b9a">read</text>
    <text x="738" y="227" text-anchor="middle" font-size="8" font-weight="600" fill="#2e7d32">write</text>
    <text x="708" y="244" text-anchor="middle" font-size="9" fill="#444">
      score &gt; threshold
    </text>
    <text x="708" y="256" text-anchor="middle" font-size="9" fill="#444">
      → emit alert
    </text>
  </g>

  <!-- Arrow 5 -->
  <path d="M 772 220 L 799 220" stroke="#444" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="785" y="212" text-anchor="middle" font-size="9" font-family="monospace" fill="#555">.send()</text>

  <!-- ============ TOPIC: alerts ============ -->
  <rect x="802" y="170" width="115" height="100" rx="8"
        fill="#fff3e0" stroke="#ef6c00" stroke-width="2"/>
  <text x="859" y="193" text-anchor="middle" font-size="10" font-weight="700" fill="#e65100">
    TOPIC
  </text>
  <text x="859" y="210" text-anchor="middle" font-size="12" font-weight="600" fill="#bf360c">
    alerts
  </text>
  <g transform="translate(819, 222)">
    <rect x="0"  y="0" width="18" height="18" fill="#ffe0b2" stroke="#fb8c00"/>
    <rect x="18" y="0" width="18" height="18" fill="#ffe0b2" stroke="#fb8c00"/>
    <rect x="36" y="0" width="18" height="18" fill="#ffe0b2" stroke="#fb8c00"/>
    <text x="9"  y="13" text-anchor="middle" font-size="9" fill="#bf360c">0</text>
    <text x="27" y="13" text-anchor="middle" font-size="9" fill="#bf360c">1</text>
    <text x="45" y="13" text-anchor="middle" font-size="9" fill="#bf360c">2</text>
  </g>
  <text x="859" y="258" text-anchor="middle" font-size="8" font-style="italic" fill="#8d6e63">
    3 partitions · key-routed
  </text>

  <!-- Arrow 6 -->
  <path d="M 920 220 L 947 220" stroke="#444" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="933" y="212" text-anchor="middle" font-size="9" font-family="monospace" fill="#555">.next()</text>

  <!-- ============ STAGE 4: Consumer (notifier — final sink) ============ -->
  <rect x="950" y="170" width="110" height="100" rx="8"
        fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
  <text x="1005" y="195" text-anchor="middle" font-size="11" font-weight="700" fill="#4a148c">
    CONSUMER
  </text>
  <text x="1005" y="215" text-anchor="middle" font-size="12" font-weight="600" fill="#7b1fa2">
    notifier
  </text>
  <text x="1005" y="234" text-anchor="middle" font-size="9" fill="#6a1b9a">
    writes to
  </text>
  <text x="1005" y="246" text-anchor="middle" font-size="9" fill="#6a1b9a">
    Slack / email /
  </text>
  <text x="1005" y="258" text-anchor="middle" font-size="9" fill="#6a1b9a">
    pager
  </text>

  <!-- ============ ANNOTATION ROW ============ -->
  <text x="550" y="304" text-anchor="middle" font-size="11" fill="#444">
    Each stage is an independent
    <tspan font-family="monospace" fill="#0d47a1">tokio::spawn</tspan>
    task. Producers and consumers are cheap
    <tspan font-family="monospace" fill="#0d47a1">Arc</tspan>-handles to the broker; cloning is free.
  </text>

  <!-- ============ KAFKO BROKER (containing band, drawn under topics for context) ============ -->
  <!-- Bracket suggesting all topics live inside one Kafko broker -->
  <path d="M 198 290 L 198 322 L 917 322 L 917 290" stroke="#1565c0" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <rect x="500" y="312" width="115" height="22" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="557" y="328" text-anchor="middle" font-size="11" font-weight="700" fill="#0d47a1">
    Kafko broker
  </text>

  <!-- ============ DISK STORAGE ============ -->
  <rect x="55" y="365" width="1005" height="115" rx="8"
        fill="#fafafa" stroke="#424242" stroke-width="2"/>
  <text x="557" y="390" text-anchor="middle" font-size="13" font-weight="700" fill="#212121">
    Persistent storage on disk
  </text>
  <text x="557" y="405" text-anchor="middle" font-size="10" font-family="monospace" fill="#616161">
    ./data/
  </text>

  <g transform="translate(225, 415)">
    <rect x="0" y="0" width="105" height="55" fill="#fff" stroke="#616161" rx="4"/>
    <text x="52" y="16" text-anchor="middle" font-size="10" font-weight="700" fill="#424242">raw_events/</text>
    <text x="52" y="32" text-anchor="middle" font-size="8" font-family="monospace" fill="#757575">0/ 1/ … 5/</text>
    <text x="52" y="44" text-anchor="middle" font-size="8" font-family="monospace" fill="#757575">offsets/enricher</text>
  </g>
  <g transform="translate(530, 415)">
    <rect x="0" y="0" width="105" height="55" fill="#fff" stroke="#616161" rx="4"/>
    <text x="52" y="16" text-anchor="middle" font-size="10" font-weight="700" fill="#424242">enriched/</text>
    <text x="52" y="32" text-anchor="middle" font-size="8" font-family="monospace" fill="#757575">0/ 1/ … 5/</text>
    <text x="52" y="44" text-anchor="middle" font-size="8" font-family="monospace" fill="#757575">offsets/filter</text>
  </g>
  <g transform="translate(820, 415)">
    <rect x="0" y="0" width="105" height="55" fill="#fff" stroke="#616161" rx="4"/>
    <text x="52" y="16" text-anchor="middle" font-size="10" font-weight="700" fill="#424242">alerts/</text>
    <text x="52" y="32" text-anchor="middle" font-size="8" font-family="monospace" fill="#757575">0/ 1/ 2/</text>
    <text x="52" y="44" text-anchor="middle" font-size="8" font-family="monospace" fill="#757575">offsets/notifier</text>
  </g>

  <!-- Arrows from each topic to its disk dir -->
  <path d="M 255 270 L 255 415" stroke="#616161" stroke-width="1.5" stroke-dasharray="3,3" fill="none" marker-end="url(#arrow-disk)"/>
  <path d="M 557 270 L 557 415" stroke="#616161" stroke-width="1.5" stroke-dasharray="3,3" fill="none" marker-end="url(#arrow-disk)"/>
  <path d="M 859 270 L 859 415" stroke="#616161" stroke-width="1.5" stroke-dasharray="3,3" fill="none" marker-end="url(#arrow-disk)"/>

  <text x="557" y="495" text-anchor="middle" font-size="10" font-style="italic" fill="#555">
    one log per partition (&lt;topic&gt;/&lt;n&gt;/) · framed records · CRC32 · sparse index · torn-tail recovery · committed offsets per group
  </text>

  <!-- ============ FOOTER ANNOTATIONS ============ -->
  <text x="550" y="540" text-anchor="middle" font-size="12" fill="#333">
    A
    <tspan font-weight="700" fill="#4a148c">CONS + PROD</tspan>
    box is one
    <tspan font-family="monospace" fill="#0d47a1">tokio::spawn</tspan>
    that holds both a
    <tspan font-family="monospace" fill="#0d47a1">Consumer</tspan>
    handle and a
    <tspan font-family="monospace" fill="#0d47a1">Producer</tspan>
    handle.
  </text>
  <text x="550" y="558" text-anchor="middle" font-size="12" fill="#333">
    Loop:
    <tspan font-family="monospace" fill="#1b5e20">let r = consumer.next_record().await?;</tspan>
    →
    <tspan font-family="monospace" fill="#bf360c">transform(r)</tspan>
    →
    <tspan font-family="monospace" fill="#1b5e20">producer.send(...).await?;</tspan>
  </text>
  <text x="550" y="580" text-anchor="middle" font-size="11" fill="#666">
    Same broker, same process, no network — the pipeline is just function calls.
  </text>
  <text x="550" y="600" text-anchor="middle" font-size="10" font-style="italic" fill="#666">
    Crash midway? A group consumer (consumer_for_group + commit) resumes from its committed offset on restart. The log IS the durability boundary.
  </text>

  <!-- ============ NEW-IN-v0.3 FEATURE LEGEND ============ -->
  <rect x="55" y="626" width="1005" height="96" rx="8"
        fill="#f1f8e9" stroke="#558b2f" stroke-width="1.5"/>
  <text x="557" y="647" text-anchor="middle" font-size="12" font-weight="700" fill="#33691e">
    Kafka-style semantics (v0.3)
  </text>
  <text x="75" y="669" font-size="10.5" fill="#333">
    <tspan font-weight="700" fill="#bf360c">Multi-partition + key routing</tspan>
    — <tspan font-family="monospace" fill="#0d47a1">hash(key) % N</tspan> picks the partition; order is kept per key while partitions' writer tasks run in parallel.
  </text>
  <text x="75" y="688" font-size="10.5" fill="#333">
    <tspan font-weight="700" fill="#4a148c">Merged consumer</tspan>
    — one consumer reads every partition as a single stream; <tspan font-family="monospace" fill="#0d47a1">RecordPosition { partition, offset }</tspan> reports where each record landed.
  </text>
  <text x="75" y="707" font-size="10.5" fill="#333">
    <tspan font-weight="700" fill="#1b5e20">Resumable group consumers</tspan>
    — <tspan font-family="monospace" fill="#0d47a1">consumer_for_group(topic, group)</tspan> + <tspan font-family="monospace" fill="#0d47a1">commit()</tspan> persist a committed offset per partition; distinct groups read independently.
  </text>

</svg>
